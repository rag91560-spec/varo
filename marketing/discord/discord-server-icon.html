<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    font-family: 'Segoe UI', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  }

  .canvas {
    width: 512px;
    height: 512px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 35% 25%, #1e0a4a 0%, transparent 55%),
      radial-gradient(ellipse at 65% 75%, #0a1a4a 0%, transparent 50%),
      linear-gradient(145deg, #0e0e22 0%, #10102e 50%, #0a0a1c 100%);
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(100, 70, 255, 0.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100, 70, 255, 0.055) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* 원형 글로우 링 */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(120, 80, 255, 0.2);
  }
  .ring-1 { width: 360px; height: 360px; box-shadow: 0 0 50px rgba(100, 60, 220, 0.12), inset 0 0 50px rgba(100, 60, 220, 0.06); }
  .ring-2 { width: 440px; height: 440px; border-color: rgba(80, 140, 255, 0.1); }

  /* 상단 글로우 */
  .glow {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 350px;
    height: 350px;
    background: radial-gradient(ellipse, rgba(110, 65, 255, 0.18) 0%, transparent 65%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .icon-svg {
    width: 220px;
    height: 220px;
    filter:
      drop-shadow(0 0 22px rgba(120, 80, 255, 0.85))
      drop-shadow(0 0 55px rgba(80, 140, 255, 0.4));
  }

  .title {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1;
    background: linear-gradient(135deg, #d0b0ff 0%, #90b8ff 50%, #b0e0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 14px rgba(140, 100, 255, 0.55));
  }

  .sub {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3.5px;
    color: rgba(170, 190, 255, 0.4);
    text-transform: uppercase;
    margin-top: -4px;
  }

  /* 원형 크롭 가이드 */
  .crop-guide {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px dashed rgba(255,255,255,0.07);
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-1"></div>

  <div class="content">
    <svg class="icon-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#b080ff"/>
          <stop offset="50%" style="stop-color:#7090ff"/>
          <stop offset="100%" style="stop-color:#40c0ff"/>
        </linearGradient>
        <filter id="gl">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path d="M30 95 Q28 70 50 65 L80 62 Q100 58 120 62 L150 65 Q172 70 170 95 L165 128 Q160 150 140 152 Q120 154 110 138 L90 138 Q80 154 60 152 Q40 150 35 128 Z"
            fill="url(#cg)" opacity="0.92" filter="url(#gl)"/>
      <path d="M42 95 Q40 74 58 70 L80 67 Q100 63 120 67 L142 70 Q160 74 158 95 L154 122 Q150 140 134 142 Q118 144 110 130 L90 130 Q82 144 66 142 Q50 140 46 122 Z"
            fill="rgba(15,10,35,0.45)"/>
      <rect x="55" y="87" width="10" height="30" rx="2" fill="white" opacity="0.92"/>
      <rect x="48" y="94" width="24" height="10" rx="2" fill="white" opacity="0.92"/>
      <circle cx="138" cy="92" r="7" fill="rgba(255,100,160,0.9)"/>
      <circle cx="152" cy="102" r="7" fill="rgba(100,220,255,0.9)"/>
      <circle cx="124" cy="102" r="7" fill="rgba(160,255,120,0.9)"/>
      <circle cx="138" cy="112" r="7" fill="rgba(255,210,60,0.9)"/>
      <g transform="translate(100,48)" opacity="0.92">
        <text x="-22" y="4" font-size="13" font-weight="800" fill="#c090ff" font-family="monospace">KR</text>
        <line x1="-2" y1="0" x2="8" y2="0" stroke="#80b4ff" stroke-width="2.5" stroke-linecap="round"/>
        <polyline points="5,-4 10,0 5,4" fill="none" stroke="#80b4ff" stroke-width="2.5" stroke-linejoin="round"/>
      </g>
      <circle cx="78" cy="118" r="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <circle cx="78" cy="118" r="5" fill="rgba(255,255,255,0.3)"/>
      <circle cx="122" cy="118" r="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <circle cx="122" cy="118" r="5" fill="rgba(255,255,255,0.3)"/>
      <path d="M50 70 Q60 60 80 62" stroke="url(#cg)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M150 70 Q140 60 120 62" stroke="url(#cg)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
    </svg>

    <div class="title">번역기</div>
    <div class="sub">Translator</div>
  </div>

  <div class="crop-guide"></div>
</div>
</body>
</html>
