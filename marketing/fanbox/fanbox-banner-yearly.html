<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 440px; overflow: hidden; font-family: 'Segoe UI', 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
  .canvas { width: 1200px; height: 440px; position: relative; display: flex; align-items: center; overflow: hidden; }
  .bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 15% 50%, #041a20 0%, transparent 50%), radial-gradient(ellipse at 85% 30%, #0a2a1a 0%, transparent 50%), linear-gradient(135deg, #060e12 0%, #0a1a18 60%, #06100e 100%); }
  .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(40,180,140,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(40,180,140,.05) 1px, transparent 1px); background-size: 40px 40px; }
  .deco-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(40,180,140,.1); pointer-events: none; }
  .deco-1 { width: 520px; height: 520px; top: -160px; left: -80px; }
  .deco-2 { width: 320px; height: 320px; bottom: -100px; right: 60px; border-color: rgba(30,160,120,.08); }
  .badge { position: absolute; top: 24px; right: 40px; z-index: 20; background: linear-gradient(135deg, rgba(40,180,140,.2), rgba(30,140,120,.2)); border: 1px solid rgba(50,200,160,.3); border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 700; color: rgba(140,255,220,.75); letter-spacing: 1.5px; }
  .left { position: relative; z-index: 10; width: 300px; display: flex; flex-direction: column; align-items: center; padding-left: 40px; flex-shrink: 0; }
  .icon-svg { width: 140px; height: 140px; filter: drop-shadow(0 0 20px rgba(40,180,140,.8)) drop-shadow(0 0 50px rgba(30,200,160,.35)); margin-bottom: 14px; }
  .plan-title { font-size: 24px; font-weight: 900; text-align: center; background: linear-gradient(135deg, #60e0b0, #40c0a0, #80ffd0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .plan-sub { font-size: 10px; font-weight: 600; letter-spacing: 2.5px; color: rgba(100,200,180,.4); text-transform: uppercase; margin-top: 4px; }
  .divider { position: relative; z-index: 10; width: 1px; height: 300px; background: linear-gradient(to bottom, transparent, rgba(40,180,140,.3) 25%, rgba(30,200,160,.3) 75%, transparent); flex-shrink: 0; margin: 0 10px; }
  .right { position: relative; z-index: 10; flex: 1; padding: 30px 50px 30px 40px; display: flex; flex-direction: column; gap: 12px; }
  .plan-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: rgba(60,200,160,.65); text-transform: uppercase; }
  .price-row { display: flex; align-items: baseline; gap: 4px; }
  .price-currency { font-size: 22px; font-weight: 700; color: rgba(120,220,190,.6); }
  .price-num { font-size: 56px; font-weight: 900; background: linear-gradient(135deg, #40c0a0, #60e0c0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -2px; line-height: 1; }
  .price-period { font-size: 18px; color: rgba(100,200,180,.45); font-weight: 500; }
  .price-note { font-size: 12px; color: rgba(120,220,180,.5); margin-top: -4px; }
  .hdivider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(40,180,140,.3) 50%, transparent); }
  .benefits { display: flex; flex-direction: column; gap: 8px; }
  .benefit { display: flex; align-items: center; gap: 10px; }
  .benefit-icon { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, rgba(40,180,140,.3), rgba(30,160,120,.3)); border: 1px solid rgba(50,200,160,.4); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .benefit-text { font-size: 13px; color: rgba(180,240,220,.75); font-weight: 500; }
  .cancel-note { font-size: 11px; color: rgba(140,220,180,.5); margin-top: 2px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg"></div><div class="grid"></div>
  <div class="deco-ring deco-1"></div><div class="deco-ring deco-2"></div>
  <div class="badge">Yearly Plan ✦</div>
  <div class="left">
    <svg class="icon-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#40c0a0"/><stop offset="50%" style="stop-color:#30a080"/><stop offset="100%" style="stop-color:#60e0c0"/></linearGradient><filter id="gl"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      <path d="M30 95 Q28 70 50 65 L80 62 Q100 58 120 62 L150 65 Q172 70 170 95 L165 128 Q160 150 140 152 Q120 154 110 138 L90 138 Q80 154 60 152 Q40 150 35 128 Z" fill="url(#cg)" opacity="0.92" filter="url(#gl)"/>
      <path d="M42 95 Q40 74 58 70 L80 67 Q100 63 120 67 L142 70 Q160 74 158 95 L154 122 Q150 140 134 142 Q118 144 110 130 L90 130 Q82 144 66 142 Q50 140 46 122 Z" fill="rgba(8,20,16,0.45)"/>
      <rect x="55" y="87" width="10" height="30" rx="2" fill="white" opacity="0.9"/><rect x="48" y="94" width="24" height="10" rx="2" fill="white" opacity="0.9"/>
      <circle cx="138" cy="92" r="7" fill="rgba(100,220,180,0.9)"/><circle cx="152" cy="102" r="7" fill="rgba(60,200,255,0.9)"/><circle cx="124" cy="102" r="7" fill="rgba(120,255,180,0.9)"/><circle cx="138" cy="112" r="7" fill="rgba(200,255,120,0.9)"/>
      <g transform="translate(100,48)" opacity="0.9"><text x="-22" y="4" font-size="13" font-weight="800" fill="#50d0a0" font-family="monospace">KR</text><line x1="-2" y1="0" x2="8" y2="0" stroke="#60e0c0" stroke-width="2.5" stroke-linecap="round"/><polyline points="5,-4 10,0 5,4" fill="none" stroke="#60e0c0" stroke-width="2.5" stroke-linejoin="round"/></g>
      <circle cx="78" cy="118" r="9" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/><circle cx="78" cy="118" r="4" fill="rgba(255,255,255,0.3)"/>
      <circle cx="122" cy="118" r="9" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/><circle cx="122" cy="118" r="4" fill="rgba(255,255,255,0.3)"/>
      <path d="M50 70 Q60 60 80 62" stroke="url(#cg)" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M150 70 Q140 60 120 62" stroke="url(#cg)" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    </svg>
    <div class="plan-title">연간 이용권</div>
    <div class="plan-sub">Yearly Plan</div>
  </div>
  <div class="divider"></div>
  <div class="right">
    <div>
      <div class="plan-label">연간 이용권 ✦</div>
      <div class="price-row">
        <span class="price-currency">¥</span>
        <span class="price-num">2000</span>
        <span class="price-period">일시불</span>
      </div>
      <div class="price-note">12개월 이용 · 1회 결제</div>
    </div>
    <div class="hdivider"></div>
    <div class="benefits">
      <div class="benefit"><div class="benefit-icon">📅</div><div class="benefit-text">365일 라이선스 키 즉시 발급</div></div>
      <div class="benefit"><div class="benefit-icon">🎮</div><div class="benefit-text">UE4 / UE5 / Unity / RPG Maker 등 멀티 엔진 지원</div></div>
      <div class="benefit"><div class="benefit-icon">🤖</div><div class="benefit-text">AI 기반 자연스러운 한국어 번역 (번역 비용 본인 부담)</div></div>
      <div class="benefit"><div class="benefit-icon">💬</div><div class="benefit-text">구매자 전용 Discord 서버 접근 + 업데이트 알림</div></div>
    </div>
    <div class="cancel-note">💡 결제 후 다음 달 구독 취소하셔도 됩니다</div>
  </div>
</div>
</body>
</html>
